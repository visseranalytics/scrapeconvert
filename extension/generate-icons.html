<!DOCTYPE html>
<html>
<head>
  <title>Generate Extension Icons</title>
  <style>
    body { font-family: system-ui; padding: 20px; background: #1a1a1a; color: white; }
    canvas { border: 1px solid #333; margin: 10px; }
    a { display: inline-block; margin: 10px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; }
    .icons { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .icon-box { text-align: center; }
  </style>
</head>
<body>
  <h1>Extension Icon Generator</h1>
  <p>Click the buttons below to download each icon size:</p>

  <div class="icons">
    <div class="icon-box">
      <canvas id="icon16" width="16" height="16"></canvas>
      <br><a id="dl16" download="icon16.png">Download 16x16</a>
    </div>
    <div class="icon-box">
      <canvas id="icon32" width="32" height="32"></canvas>
      <br><a id="dl32" download="icon32.png">Download 32x32</a>
    </div>
    <div class="icon-box">
      <canvas id="icon48" width="48" height="48"></canvas>
      <br><a id="dl48" download="icon48.png">Download 48x48</a>
    </div>
    <div class="icon-box">
      <canvas id="icon128" width="128" height="128"></canvas>
      <br><a id="dl128" download="icon128.png">Download 128x128</a>
    </div>
  </div>

  <script>
    const sizes = [16, 32, 48, 128];

    function drawIcon(ctx, size) {
      const scale = size / 128;

      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');

      // Rounded rect background
      const radius = 24 * scale;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fillStyle = gradient;
      ctx.fill();

      // Image frame
      ctx.strokeStyle = 'white';
      ctx.lineWidth = Math.max(1, 6 * scale);
      ctx.beginPath();
      ctx.roundRect(28 * scale, 36 * scale, 72 * scale, 56 * scale, 8 * scale);
      ctx.stroke();

      // Sun circle
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(48 * scale, 56 * scale, 8 * scale, 0, Math.PI * 2);
      ctx.fill();

      // Mountain shape
      ctx.beginPath();
      ctx.moveTo(28 * scale, 76 * scale);
      ctx.lineTo(52 * scale, 60 * scale);
      ctx.lineTo(68 * scale, 72 * scale);
      ctx.lineTo(84 * scale, 56 * scale);
      ctx.lineTo(100 * scale, 72 * scale);
      ctx.lineTo(100 * scale, 84 * scale);
      ctx.quadraticCurveTo(100 * scale, 92 * scale, 92 * scale, 92 * scale);
      ctx.lineTo(36 * scale, 92 * scale);
      ctx.quadraticCurveTo(28 * scale, 92 * scale, 28 * scale, 84 * scale);
      ctx.closePath();
      ctx.fill();

      // Download badge (only for larger sizes)
      if (size >= 32) {
        const bx = 80 * scale;
        const by = 80 * scale;
        const br = 20 * scale;

        // White circle
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(bx + 16 * scale, by + 16 * scale, br, 0, Math.PI * 2);
        ctx.fill();

        // Arrow
        ctx.strokeStyle = '#667eea';
        ctx.lineWidth = Math.max(1, 3 * scale);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const cx = bx + 16 * scale;
        const cy = by + 16 * scale;

        // Vertical line
        ctx.beginPath();
        ctx.moveTo(cx, cy - 8 * scale);
        ctx.lineTo(cx, cy + 4 * scale);
        ctx.stroke();

        // Arrow head
        ctx.beginPath();
        ctx.moveTo(cx - 6 * scale, cy);
        ctx.lineTo(cx, cy + 6 * scale);
        ctx.lineTo(cx + 6 * scale, cy);
        ctx.stroke();

        // Base line
        ctx.beginPath();
        ctx.moveTo(cx - 8 * scale, cy + 8 * scale);
        ctx.lineTo(cx + 8 * scale, cy + 8 * scale);
        ctx.stroke();
      }
    }

    sizes.forEach(size => {
      const canvas = document.getElementById('icon' + size);
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, size);

      const link = document.getElementById('dl' + size);
      link.href = canvas.toDataURL('image/png');
    });
  </script>
</body>
</html>
